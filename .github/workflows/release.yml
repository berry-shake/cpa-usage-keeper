name: Release

on:
  push:
    tags:
      - 'v*fork*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build web frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} binary
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_arch: amd64
            binary_ext: ''
          - goos: linux
            goarch: arm64
            asset_arch: arm64
            binary_ext: ''
          - goos: darwin
            goarch: amd64
            asset_arch: amd64
            binary_ext: ''
          - goos: darwin
            goarch: arm64
            asset_arch: arm64
            binary_ext: ''
          - goos: windows
            goarch: amd64
            asset_arch: amd64
            binary_ext: '.exe'
          - goos: windows
            goarch: arm64
            asset_arch: arm64
            binary_ext: '.exe'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          set -euo pipefail
          mkdir -p build
          output="build/cpa-usage-keeper_${GOOS}_${ASSET_ARCH}${BINARY_EXT}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "${output}" ./cmd/server/main.go
          file "${output}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: build/cpa-usage-keeper_${{ matrix.goos }}_${{ matrix.asset_arch }}${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          path: build
          merge-multiple: true

      - name: Prepare Docker context
        run: |
          set -euo pipefail
          mkdir -p docker-context/bin
          cp build/cpa-usage-keeper_linux_amd64 docker-context/bin/cpa-usage-keeper-amd64
          cp build/cpa-usage-keeper_linux_arm64 docker-context/bin/cpa-usage-keeper-arm64
          cp docker-entrypoint.sh docker-context/docker-entrypoint.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert image name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: .github/docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-packages:
    name: Build release packages
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: build
          merge-multiple: true

      - name: Build release packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          package_unix() {
            goos="$1"
            arch="$2"
            binary="build/cpa-usage-keeper_${goos}_${arch}"
            package_name="cpa-usage-keeper_${VERSION}_${goos}_${arch}"
            package_dir="dist/${package_name}"
            mkdir -p "${package_dir}/data"
            cp "${binary}" "${package_dir}/cpa-usage-keeper"
            chmod +x "${package_dir}/cpa-usage-keeper"
            cp .env.example README.md README.en.md LICENSE CONTRIBUTORS.md "${package_dir}/"
            if [ "${goos}" = "linux" ]; then
              cp deploy/linux/cpa-usage-keeper.service "${package_dir}/"
            fi
            tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"
          }

          package_windows() {
            arch="$1"
            binary="build/cpa-usage-keeper_windows_${arch}.exe"
            package_name="cpa-usage-keeper_${VERSION}_windows_${arch}"
            package_dir="dist/${package_name}"
            mkdir -p "${package_dir}/data"
            cp "${binary}" "${package_dir}/cpa-usage-keeper.exe"
            cp .env.example README.md README.en.md LICENSE CONTRIBUTORS.md "${package_dir}/"
            (cd dist && zip -qr "${package_name}.zip" "${package_name}")
          }

          package_unix linux amd64
          package_unix linux arm64
          package_unix darwin amd64
          package_unix darwin arm64
          package_windows amd64
          package_windows arm64

      - name: Upload release package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 1

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - docker
      - build-packages
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release package artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
