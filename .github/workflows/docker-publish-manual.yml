name: Publish Docker image manually

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: true
        type: string
        default: manual
      platforms:
        description: Target platforms
        required: true
        type: string
        default: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build web frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/web
          cp go.mod go.sum docker-context/
          cp -R cmd internal docker-context/
          cp web/static.go docker-context/web/static.go
          cp -R web/dist docker-context/web/dist
          cp docker-entrypoint.sh docker-context/docker-entrypoint.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert image name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: .github/docker/Dockerfile.manual
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
