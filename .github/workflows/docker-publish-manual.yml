name: Publish Docker image manually

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build web frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  build-binaries:
    name: Build Linux ${{ matrix.arch }} binary
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build binary
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -trimpath -ldflags "-s -w" -o build/cpa-usage-keeper-${{ matrix.arch }} ./cmd/server/main.go
          file build/cpa-usage-keeper-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: build/cpa-usage-keeper-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          path: build
          merge-multiple: true

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/bin
          cp build/cpa-usage-keeper-amd64 docker-context/bin/cpa-usage-keeper-amd64
          cp build/cpa-usage-keeper-arm64 docker-context/bin/cpa-usage-keeper-arm64
          cp docker-entrypoint.sh docker-context/docker-entrypoint.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert image name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: .github/docker/Dockerfile.manual
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
